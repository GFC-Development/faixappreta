<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:100%;height:13px;border-radius:2px;overflow:hidden;background:#e9e7e1;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1),inset 0 -2px 3px rgba(0,0,0,.16)">
  <div style="position:absolute;inset:0;background:{{ beltColor }}"></div>
  <div style="position:absolute;top:0;bottom:0;right:12%;width:26%;background:#161616;box-shadow:-1px 0 0 rgba(0,0,0,.25),1px 0 0 rgba(0,0,0,.25)">
    <sc-for list="{{ stripes }}" as="g" hint-placeholder-count="0">
      <div style="position:absolute;top:1.5px;bottom:1.5px;width:2px;margin-left:-1px;border-radius:1px;background:#fbfbf8;box-shadow:0 0 0 .5px rgba(0,0,0,.2);left:{{ g.pct }}"></div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:150,&quot;height&quot;:13},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#5b21b6&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;degrees&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;min&quot;:0,&quot;max&quot;:4,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const n = Math.max(0, Math.min(4, this.props.degrees ?? 0));
    const stripes = [];
    for(let i=0;i<n;i++){ stripes.push({ pct: (((i+1)/(n+1))*100).toFixed(1)+'%' }); }
    return { beltColor: this.props.color ?? '#161616', stripes };
  }
}
</script>
</body>
</html>
